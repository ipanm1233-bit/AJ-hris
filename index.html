<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal HRIS & Operasional — CV Andela Jaya</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><rect width=%2224%22 height=%2224%22 rx=%226%22 fill=%22%237a1f2b%22/><text x=%2212%22 y=%2217%22 font-size=%2213%22 fill=%22white%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-weight=%22bold%22>AJ</text></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<!-- Mesin Pembaca Excel (Tambahkan baris ini) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>  
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          maroon: {
            50:'#fbf3f3',100:'#f4e0e1',200:'#e6bcbe',300:'#d38f93',400:'#bd5f66',
            500:'#a53d45',600:'#8c2e36',700:'#7a1f2b',800:'#651a24',900:'#551821',950:'#2f0a0f'
          }
        },
        fontFamily: { sans: ['Inter','ui-sans-serif','system-ui','sans-serif'] },
        boxShadow: { soft: '0 2px 12px -2px rgba(15,23,42,0.06)' }
      }
    }
  }
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" onerror="this.remove()">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0ea5e9">
<link rel="apple-touch-icon" href="/assets/icon-192x192.png">  
<!-- Quill JS untuk Rich Text Editor (Modul Memo) -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>  
</head>
<body class="font-sans bg-slate-50 text-slate-800 antialiased">

<!-- ===================== TOAST HOST ===================== -->
<div id="toast-host" class="fixed top-4 right-4 z-[200] flex flex-col gap-2 w-80"></div>

<!-- ===================== GATE: LOADING ===================== -->
<div id="boot-loader" class="fixed inset-0 z-[300] bg-white flex flex-col items-center justify-center gap-3">
  <div class="w-12 h-12 rounded-2xl bg-maroon-700 flex items-center justify-center text-white font-bold text-lg animate-pulse">AJ</div>
  <p class="text-sm text-slate-400">Memuat Portal HRIS...</p>
</div>

<!-- ===================== APP SHELL (muncul setelah login tervalidasi) ===================== -->
<div id="app-shell" class="hidden min-h-screen">

  <!-- HEADER -->
  <header class="fixed top-0 left-0 right-0 h-16 bg-white border-b border-slate-100 z-40 flex items-center px-4 gap-3 shadow-sm">
    <button id="btn-sidebar-toggle" class="p-2 rounded-lg hover:bg-slate-100 text-slate-500 transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="flex items-center gap-2">
      <div class="w-9 h-9 rounded-xl bg-maroon-700 flex items-center justify-center text-white font-bold text-sm shrink-0">AJ</div>
      <div class="hidden sm:block leading-tight">
        <p class="text-sm font-bold text-slate-800">Andela Jaya</p>
        <p class="text-[11px] text-slate-400 -mt-0.5">Portal HRIS & Operasional</p>
      </div>
    </div>

    <div class="flex-1"></div>

    <div id="header-clock" class="hidden md:block text-xs text-slate-400 mr-2"></div>

    <button id="btn-notif" class="relative p-2 rounded-lg hover:bg-slate-100 text-slate-500 transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      <span id="notif-dot" class="hidden absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-maroon-600"></span>
    </button>

    <div class="relative">
      <button id="btn-user-menu" class="flex items-center gap-2 pl-2 pr-1 py-1 rounded-lg hover:bg-slate-100 transition">
        <div id="header-avatar" class="w-8 h-8 rounded-full bg-maroon-100 text-maroon-800 flex items-center justify-center font-semibold text-xs">?</div>
        <div class="hidden md:block text-left leading-tight">
          <p id="header-nama" class="text-xs font-semibold text-slate-700">-</p>
          <p id="header-role" class="text-[10px] text-slate-400 -mt-0.5">-</p>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div id="user-menu-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-slate-100 py-1.5 z-50">
        <button id="btn-logout" class="w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Keluar
        </button>
      </div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="fixed top-16 left-0 bottom-0 w-64 bg-white border-r border-slate-100 z-30 overflow-y-auto transition-all duration-300 ease-in-out">
    <nav id="sidebar-nav" class="p-3 flex flex-col gap-1"></nav>
  </aside>

  <!-- BACKDROP MOBILE -->
  <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-slate-900/40 z-20 lg:hidden"></div>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="pt-16 transition-all duration-300 ease-in-out min-h-screen" style="margin-left:16rem;">
    <div class="p-4 sm:p-6 lg:p-8 max-w-[1600px] mx-auto">
      <div id="view-container" class="animate-fadein"></div>
    </div>
  </main>
</div>

<!-- ===================== LOGIN VIEW (di luar shell) ===================== -->
<div id="login-container" class="hidden"></div>

<script type="module" src="js/app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/firebase-messaging-sw.js')
    .then((registration) => {
      console.log('Service Worker berhasil didaftarkan!', registration);
    }).catch((err) => {
      console.log('Service Worker gagal:', err);
    });
}
</script>  
  
</body>
</html>
