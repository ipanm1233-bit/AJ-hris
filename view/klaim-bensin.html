<div class="space-y-6 max-w-5xl">
  <div>
    <h1 class="text-2xl font-bold text-slate-800">Klaim Bensin & Operasional</h1>
    <p class="text-sm text-slate-500 mt-1">Isi rincian perjalanan dinas Anda di bawah ini. Total petrol dihitung otomatis.</p>
  </div>
  
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden p-5">
    <div class="overflow-x-auto">
      <table class="w-full text-sm text-left border-collapse min-w-[700px]">
        <thead class="bg-slate-50 text-slate-500">
          <tr>
            <th class="p-2 font-medium rounded-tl-lg">Tanggal</th>
            <th class="p-2 font-medium">KM Awal</th>
            <th class="p-2 font-medium">KM Akhir</th>
            <th class="p-2 font-medium">Parkir (Rp)</th>
            <th class="p-2 font-medium">Denda (Rp)</th>
            <th class="p-2 font-medium text-right">Total Petrol (Rp)</th>
            <th class="p-2 font-medium rounded-tr-lg"></th>
          </tr>
        </thead>
        <tbody id="kb-tbody">
          <!-- Baris akan diisi oleh JS -->
        </tbody>
      </table>
    </div>
    <button id="kb-add-row" class="mt-4 flex items-center gap-1.5 text-sm text-maroon-700 font-medium hover:underline">
      + Tambah Baris Perjalanan
    </button>
  </div>

  <div class="flex justify-between items-center bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
    <div>
      <p class="text-sm text-slate-500">Total Keseluruhan Klaim</p>
      <p id="kb-grand-total" class="text-2xl font-bold text-maroon-700">Rp 0</p>
    </div>
    <button id="kb-submit" class="px-6 py-2.5 bg-maroon-700 text-white rounded-lg font-medium hover:bg-maroon-800 transition">
      Ajukan Klaim
    </button>
  </div>
</div>
