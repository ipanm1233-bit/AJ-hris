<div class="space-y-6 max-w-2xl">
  <div>
    <h1 class="text-2xl font-bold text-slate-800">Export Data</h1>
    <p class="text-sm text-slate-500 mt-1">Tarik laporan massal dari koleksi manapun menjadi format CSV/Excel.</p>
  </div>

  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-4">
    <div>
      <label class="block text-xs font-medium text-slate-500 mb-1.5">Pilih Koleksi Data</label>
      <select id="export-select" class="w-full px-3 py-2.5 text-sm rounded-lg border border-slate-200 focus:border-maroon-400 outline-none"></select>
    </div>
    <div id="export-count" class="text-sm text-slate-500"></div>
    <button id="export-btn" class="flex items-center gap-2 bg-maroon-700 hover:bg-maroon-800 text-white text-sm font-medium px-5 py-2.5 rounded-lg transition">
      Export ke CSV
    </button>
  </div>

  <p class="text-xs text-slate-400">File CSV kompatibel dibuka di Microsoft Excel maupun Google Sheets. Untuk laporan berformat khusus (mis. slip gaji), gunakan modul terkait masing-masing.</p>
</div>
