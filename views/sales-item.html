<div class="space-y-6">
  <!-- HEADER -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Master Item (Produk)</h1>
      <p class="text-sm text-slate-500 mt-1">Katalog item barang, harga, dan SKU penjualan resmi CV Andela Jaya.</p>
    </div>
    <div class="flex items-center gap-2">
      <button id="btn-import-item-excel" class="inline-flex items-center gap-2 bg-emerald-700 hover:bg-emerald-800 text-white px-4 py-2.5 rounded-lg text-sm font-semibold transition shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        Import Excel
      </button>
      <button id="btn-add-item" class="inline-flex items-center gap-2 bg-maroon-700 hover:bg-maroon-800 text-white px-4 py-2.5 rounded-lg text-sm font-semibold transition shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
        Tambah Item Baru
      </button>
    </div>
  </div>

  <!-- FILTERS & SEARCH -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 flex flex-col md:flex-row gap-4 items-center">
    <div class="relative flex-1 w-full">
      <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </span>
      <input type="text" id="search-item" class="w-full pl-9 pr-4 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-maroon-400 focus:ring-2 focus:ring-maroon-100 transition" placeholder="Cari nama barang, SKU, atau kategori...">
    </div>
    <div class="w-full md:w-48">
      <select id="filter-category" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-maroon-400 transition bg-white">
        <option value="">Semua Kategori</option>
        <option value="Makanan">Makanan</option>
        <option value="Minuman">Minuman</option>
        <option value="Sembako">Sembako</option>
        <option value="Kebutuhan Rumah Tangga">Kebutuhan Rumah Tangga</option>
        <option value="Lain-lain">Lain-lain</option>
      </select>
    </div>
  </div>

  <!-- ITEM TABLE -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="border-b border-slate-100 bg-slate-50/75 text-[11px] font-bold text-slate-400 uppercase tracking-wider">
            <th class="px-6 py-4">SKU / Kode Item</th>
            <th class="px-6 py-4">Nama Barang</th>
            <th class="px-6 py-4">Kategori</th>
            <th class="px-6 py-4">Harga Jual (Rp)</th>
            <th class="px-6 py-4">Satuan / UoM</th>
            <th class="px-6 py-4">Deskripsi</th>
            <th class="px-6 py-4 text-right">Aksi</th>
          </tr>
        </thead>
        <tbody id="item-table-body" class="divide-y divide-slate-50 text-sm text-slate-600">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
    <div id="item-empty-state" class="hidden py-16"></div>
  </div>
</div>
