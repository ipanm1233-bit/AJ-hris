<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-800">Manajemen Cuti</h1>
    <p class="text-sm text-slate-500 mt-1">Otorisasi dan kontrol jatah cuti seluruh karyawan.</p>
  </div>

  <div class="flex items-center gap-2 border-b border-slate-100">
    <button data-ctab="jatah" class="cuti-tab px-4 py-2.5 text-sm font-medium border-b-2 border-maroon-700 text-maroon-700">Jatah Cuti Karyawan</button>
    <button data-ctab="log" class="cuti-tab px-4 py-2.5 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700">Log Pengambilan Cuti</button>
  </div>

  <div id="cuti-panel-jatah">
    <div class="relative max-w-sm mb-4">
      <input id="cuti-search" type="text" placeholder="Cari nama karyawan..." class="w-full pl-9 pr-3 py-2.5 text-sm rounded-lg border border-slate-200 focus:border-maroon-400 outline-none transition">
      <span class="absolute left-3 top-2.5 text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
      </span>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
            <tr>
              <th class="px-4 py-3 text-left font-medium">Karyawan</th>
              <th class="px-4 py-3 text-left font-medium">Cabang</th>
              <th class="px-4 py-3 text-center font-medium">Tahunan</th>
              <th class="px-4 py-3 text-center font-medium">Khusus</th>
              <th class="px-4 py-3 text-center font-medium">Akumulasi</th>
              <th class="px-4 py-3 text-right font-medium">Aksi</th>
            </tr>
          </thead>
          <tbody id="cuti-jatah-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="cuti-panel-log" class="hidden"></div>
</div>
