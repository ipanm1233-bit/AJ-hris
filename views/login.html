<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-maroon-950 via-maroon-800 to-maroon-700 px-4">
  <div class="absolute inset-0 opacity-10" style="background-image:radial-gradient(circle at 20% 20%, white 1px, transparent 1px);background-size:24px 24px;"></div>
  <div class="relative w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-white/10 backdrop-blur border border-white/20 flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4">AJ</div>
      <h1 class="text-white text-xl font-bold tracking-tight">Portal HRIS & Operasional</h1>
      <p class="text-maroon-100/70 text-sm mt-1">CV Andela Jaya</p>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-lg font-semibold text-slate-800 mb-1">Masuk ke Akun Anda</h2>
      <p class="text-sm text-slate-400 mb-6">Gunakan username & password internal perusahaan.</p>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">Username</label>
          <input id="login-username" type="text" autocomplete="username" required
            class="w-full px-3.5 py-2.5 text-sm rounded-lg border border-slate-200 focus:border-maroon-400 focus:ring-2 focus:ring-maroon-100 outline-none transition" placeholder="cth. ADELITA">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">Password</label>
          <div class="relative">
            <input id="login-password" type="password" autocomplete="current-password" required
              class="w-full px-3.5 py-2.5 text-sm rounded-lg border border-slate-200 focus:border-maroon-400 focus:ring-2 focus:ring-maroon-100 outline-none transition pr-10">
            <button type="button" id="toggle-pw" class="absolute right-3 top-2.5 text-slate-400 hover:text-slate-600 text-xs">Lihat</button>
          </div>
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 text-xs text-slate-500">
            <input type="checkbox" id="login-remember" class="rounded border-slate-300 text-maroon-700 focus:ring-maroon-400">
            Ingat saya di perangkat ini
          </label>
        </div>
        <button id="login-submit" type="submit"
          class="w-full bg-maroon-700 hover:bg-maroon-800 text-white font-medium text-sm py-2.5 rounded-lg transition flex items-center justify-center gap-2 shadow-lg shadow-maroon-900/20">
          <span id="login-btn-text">Masuk</span>
        </button>
        <p id="login-error" class="hidden text-xs text-red-600 bg-red-50 border border-red-100 rounded-lg px-3 py-2"></p>
      </form>
    </div>
    <p class="text-center text-maroon-100/50 text-xs mt-6">&copy; <span id="login-year"></span> CV Andela Jaya — Internal System</p>
  </div>
</div>
