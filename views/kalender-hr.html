<div class="space-y-6">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Kalender HR</h1>
      <p class="text-sm text-slate-500 mt-1">Agenda divisi, cuti massal, ulang tahun, anniversary & pengingat internal.</p>
    </div>
    <div class="flex items-center gap-2">
      <button id="cal-prev" class="p-2 rounded-lg border border-slate-200 hover:bg-slate-50 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <span id="cal-label" class="text-sm font-semibold text-slate-700 w-36 text-center"></span>
      <button id="cal-next" class="p-2 rounded-lg border border-slate-200 hover:bg-slate-50 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </button>
      <button id="cal-add" class="flex items-center gap-1.5 bg-maroon-700 hover:bg-maroon-800 text-white text-sm font-medium px-4 py-2 rounded-lg transition ml-2">+ Agenda</button>
    </div>
  </div>

  <div class="flex flex-wrap gap-3 text-xs">
    <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-maroon-600"></span> Cuti Massal</span>
    <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-amber-500"></span> Ulang Tahun</span>
    <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-blue-500"></span> Anniversary</span>
    <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span> Agenda / Reminder</span>
  </div>

  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 overflow-x-auto">
    <div id="cal-grid" class="grid grid-cols-7 gap-1.5 min-w-[700px]"></div>
  </div>

  <div>
    <h3 class="font-semibold text-slate-800 mb-3">Agenda Mendatang</h3>
    <div id="cal-upcoming" class="space-y-2"></div>
  </div>
</div>
