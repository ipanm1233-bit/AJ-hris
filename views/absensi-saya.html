<div class="space-y-6 max-w-5xl mx-auto pb-10">
  <div>
    <h1 class="text-2xl font-bold text-slate-800">Absensi Saya</h1>
    <p class="text-sm text-slate-500 mt-1">Riwayat kehadiran Anda sendiri selama bekerja di perusahaan. Data ini bersifat pribadi dan hanya dapat dilihat oleh Anda.</p>
  </div>

  <div class="grid grid-cols-2 sm:grid-cols-4 gap-4" id="as-summary-cards">
    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
      <p class="text-xs text-slate-400 font-medium">Total Rekap Hadir</p>
      <p id="as-total-hadir" class="text-2xl font-bold text-slate-800 mt-1">0</p>
    </div>
    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
      <p class="text-xs text-slate-400 font-medium">Hadir Bulan Ini</p>
      <p id="as-total-bulan-ini" class="text-2xl font-bold text-slate-800 mt-1">0</p>
    </div>
    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
      <p class="text-xs text-slate-400 font-medium">Belum Scan Pulang</p>
      <p id="as-total-belum-pulang" class="text-2xl font-bold text-amber-600 mt-1">0</p>
    </div>
    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
      <p class="text-xs text-slate-400 font-medium">Periode Ditampilkan</p>
      <p id="as-periode-label" class="text-sm font-bold text-slate-800 mt-2">Seluruh data</p>
    </div>
  </div>

  <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3 flex-wrap">
    <label class="text-xs text-slate-500 font-medium">Periode</label>
    <input type="date" id="as-filter-start" class="px-3 py-1.5 border border-slate-200 rounded-lg outline-none text-sm focus:border-maroon-500">
    <span class="text-xs text-slate-400">s/d</span>
    <input type="date" id="as-filter-end" class="px-3 py-1.5 border border-slate-200 rounded-lg outline-none text-sm focus:border-maroon-500">
    <button id="as-btn-reset" type="button" class="text-xs text-maroon-700 font-semibold hover:underline">Reset</button>
  </div>

  <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead class="bg-slate-50 text-slate-500 text-xs uppercase border-b border-slate-100">
          <tr>
            <th class="px-4 py-3">Tanggal</th>
            <th class="px-4 py-3 text-center">Scan Masuk</th>
            <th class="px-4 py-3 text-center">Scan Keluar</th>
            <th class="px-4 py-3 text-center">Status</th>
          </tr>
        </thead>
        <tbody id="as-tbody" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>
  </div>
</div>
