<div class="space-y-6">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Form Builder</h1>
      <p class="text-sm text-slate-500 mt-1">Rakit formulir pengajuan baru secara visual lengkap dengan logika kondisional & rumus otomatis.</p>
    </div>
    <button id="fb-new" class="flex items-center gap-1.5 bg-maroon-700 hover:bg-maroon-800 text-white text-sm font-medium px-4 py-2 rounded-lg transition">+ Formulir Baru</button>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-1">
      <h3 class="text-sm font-semibold text-slate-600 mb-3">Formulir Terdaftar</h3>
      <div id="fb-list" class="space-y-2"></div>
    </div>

    <div class="lg:col-span-2">
      <div id="fb-builder-wrap" class="hidden bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5 pb-5 border-b border-slate-100">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">ID Form</label>
            <input id="fb-id" class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:border-maroon-400 outline-none" placeholder="F-ISO-XX">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">Nama Formulir</label>
            <input id="fb-nama" class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:border-maroon-400 outline-none" placeholder="Nama form pengajuan">
          </div>
          <div class="sm:col-span-2">
            <label class="block text-xs font-medium text-slate-500 mb-1.5">Alur Persetujuan (urut, klik untuk memilih)</label>
            <div id="fb-flow" class="flex flex-wrap gap-2"></div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">Akses Berdasarkan Role</label>
            <div id="fb-rules" class="flex flex-wrap gap-2"></div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">Akses Personil Spesifik (pisahkan koma, atau "ALL")</label>
            <input id="fb-users" class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:border-maroon-400 outline-none" placeholder="ALL / Nama satu, Nama dua">
          </div>
        </div>

        <div class="flex items-center justify-between mb-3">
          <h4 class="text-sm font-semibold text-slate-700">Kolom Formulir</h4>
          <div class="flex gap-1.5 flex-wrap">
            <button data-addtype="text" class="fb-add-type text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50">+ Teks</button>
            <button data-addtype="textarea" class="fb-add-type text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50">+ Textarea</button>
            <button data-addtype="number" class="fb-add-type text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50">+ Angka</button>
            <button data-addtype="date" class="fb-add-type text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50">+ Tanggal</button>
            <button data-addtype="select" class="fb-add-type text-xs px-2.5 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50">+ Pilihan</button>
            <button data-addtype="formula" class="fb-add-type text-xs px-2.5 py-1.5 rounded-lg border border-maroon-200 text-maroon-700 hover:bg-maroon-50">+ Rumus</button>
          </div>
        </div>

        <div id="fb-fields" class="space-y-2"></div>

        <div class="flex justify-end gap-2 mt-6 pt-4 border-t border-slate-100">
          <button id="fb-delete" class="px-4 py-2 rounded-lg text-sm font-medium text-red-600 hover:bg-red-50 transition mr-auto">Hapus Formulir</button>
          <button id="fb-cancel" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition">Batal</button>
          <button id="fb-save" class="px-4 py-2 rounded-lg text-sm font-medium text-white bg-maroon-700 hover:bg-maroon-800 transition">Simpan Formulir</button>
        </div>
      </div>
      <div id="fb-empty-hint" class="text-center py-16 text-slate-400 text-sm">Pilih formulir di daftar atau klik "Formulir Baru" untuk mulai merakit.</div>
    </div>
  </div>
</div>
