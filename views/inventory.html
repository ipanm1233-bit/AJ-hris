<div class="space-y-6 pb-12">
  <!-- HEADER & TITLE -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-black text-slate-800 tracking-tight">Asset & Inventory Management</h1>
      <p class="text-xs sm:text-sm text-slate-500 mt-1">Pengelolaan aset kantor, perangkat IT, kunci, dokumen penting, dan ATK perusahaan.</p>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      <button id="btn-scan-qr" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-3.5 py-2.5 rounded-2xl text-xs sm:text-sm transition shadow-md flex items-center gap-2">
        Scan QR Aset
      </button>
      <button id="btn-assign-asset-quick" class="bg-maroon-700 hover:bg-maroon-800 text-white font-bold px-3.5 py-2.5 rounded-2xl text-xs sm:text-sm transition shadow-md flex items-center gap-2">
        Penyerahan Aset
      </button>
      <button id="btn-print-qr-all" class="border border-slate-200 bg-white hover:bg-slate-50 text-slate-700 font-bold px-3.5 py-2.5 rounded-2xl text-xs sm:text-sm transition shadow-sm flex items-center gap-2">
        Cetak QR Codes
      </button>
    </div>
  </div>

  <!-- KPI SUMMARY CARDS (BuildCorp HR Style) -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <!-- TOTAL ASSETS -->
    <div class="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm relative overflow-hidden group">
      <div class="flex items-center justify-between mb-3">
        <div class="p-3 bg-red-50 text-maroon-700 rounded-2xl font-bold">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        </div>
        <span class="text-[10px] font-extrabold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full">+12% Total</span>
      </div>
      <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">TOTAL ASET & INVENTARIS</p>
      <p id="inv-kpi-total" class="text-2xl font-black text-slate-800 mt-0.5">0</p>
    </div>

    <!-- IN MAINTENANCE / ALERT -->
    <div class="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm relative overflow-hidden group">
      <div class="flex items-center justify-between mb-3">
        <div class="p-3 bg-amber-50 text-amber-600 rounded-2xl font-bold">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        </div>
        <span class="text-[10px] font-extrabold text-amber-700 bg-amber-50 px-2 py-0.5 rounded-full">Perlu Servis</span>
      </div>
      <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">DALAM PERBAIKAN / PERLU SERVIS</p>
      <p id="inv-kpi-maintenance" class="text-2xl font-black text-slate-800 mt-0.5">0</p>
    </div>

    <!-- ASSIGNED TO EMPLOYEES -->
    <div class="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm relative overflow-hidden group">
      <div class="flex items-center justify-between mb-3">
        <div class="p-3 bg-blue-50 text-blue-600 rounded-2xl font-bold">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </div>
        <span class="text-[10px] font-extrabold text-blue-700 bg-blue-50 px-2 py-0.5 rounded-full">Tanggung Jawab</span>
      </div>
      <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">DIPAKAI KARYAWAN</p>
      <p id="inv-kpi-assigned" class="text-2xl font-black text-slate-800 mt-0.5">0</p>
    </div>

    <!-- AVAILABLE / READY -->
    <div class="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm relative overflow-hidden group">
      <div class="flex items-center justify-between mb-3">
        <div class="p-3 bg-emerald-50 text-emerald-600 rounded-2xl font-bold">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <span class="text-[10px] font-extrabold text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded-full">Ready</span>
      </div>
      <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">TERSEDIA / READY</p>
      <p id="inv-kpi-ready" class="text-2xl font-black text-slate-800 mt-0.5">0</p>
    </div>
  </div>

  <!-- NAVIGATION TABS -->
  <div class="flex items-center gap-2 border-b border-slate-200 overflow-x-auto pb-1">
    <button data-itab="barang" class="inv-tab px-4 py-2.5 text-xs sm:text-sm font-bold border-b-2 border-maroon-700 text-maroon-700 whitespace-nowrap flex items-center gap-1.5">
      Master Aset & Inventaris
    </button>
    <button data-itab="ambil" class="inv-tab px-4 py-2.5 text-xs sm:text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700 whitespace-nowrap flex items-center gap-1.5">
      Log Penyerahan & Pengembalian
    </button>
    <button data-itab="opname" class="inv-tab px-4 py-2.5 text-xs sm:text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700 whitespace-nowrap flex items-center gap-1.5">
      Stock Opname Fisik
    </button>
  </div>

  <!-- PANELS -->
  <div id="inv-panel-barang"></div>
  <div id="inv-panel-ambil" class="hidden"></div>
  <div id="inv-panel-opname" class="hidden"></div>
</div>
