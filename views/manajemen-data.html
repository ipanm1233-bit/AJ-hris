<div class="space-y-6">

    <button data-mtab="signdoc" class="md-tab px-4 py-2.5 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 whitespace-nowrap">Sign Doc (TTD Digital)</button>
