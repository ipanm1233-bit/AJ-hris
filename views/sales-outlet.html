<div class="space-y-6">
  <!-- HEADER -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Master Outlet</h1>
      <p class="text-sm text-slate-500 mt-1">Daftar toko, minimarket, dan outlet mitra CV Andela Jaya.</p>
    </div>
    <button id="btn-add-outlet" class="inline-flex items-center gap-2 bg-maroon-700 hover:bg-maroon-800 text-white px-4 py-2.5 rounded-lg text-sm font-semibold transition shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
      </svg>
      Tambah Outlet Baru
    </button>
  </div>

  <!-- FILTERS & SEARCH -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 flex flex-col md:flex-row gap-4 items-center">
    <div class="relative flex-1 w-full">
      <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </span>
      <input type="text" id="search-outlet" class="w-full pl-9 pr-4 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-maroon-400 focus:ring-2 focus:ring-maroon-100 transition" placeholder="Cari nama outlet, kode, atau alamat...">
    </div>
    <div class="w-full md:w-48">
      <select id="filter-region" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-maroon-400 transition bg-white">
        <option value="">Semua Wilayah</option>
        <option value="Yogyakarta">Yogyakarta</option>
        <option value="Sleman">Sleman</option>
        <option value="Bantul">Bantul</option>
        <option value="Kulon Progo">Kulon Progo</option>
        <option value="Gunungkidul">Gunungkidul</option>
      </select>
    </div>
  </div>

  <!-- OUTLET TABLE -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="border-b border-slate-100 bg-slate-50/75 text-[11px] font-bold text-slate-400 uppercase tracking-wider">
            <th class="px-6 py-4">Kode Outlet</th>
            <th class="px-6 py-4">Nama Outlet</th>
            <th class="px-6 py-4">Wilayah</th>
            <th class="px-6 py-4">Alamat Lengkap</th>
            <th class="px-6 py-4">No. Telepon</th>
            <th class="px-6 py-4">Tipe / Kelas</th>
            <th class="px-6 py-4 text-right">Aksi</th>
          </tr>
        </thead>
        <tbody id="outlet-table-body" class="divide-y divide-slate-50 text-sm text-slate-600">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
    <div id="outlet-empty-state" class="hidden py-16"></div>
  </div>
</div>
