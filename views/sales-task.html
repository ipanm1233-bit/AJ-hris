<div class="space-y-6">
  <!-- HEADER -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Tugas Kunjungan Sales (Task)</h1>
      <p class="text-sm text-slate-500 mt-1">Daftar agenda tugas kunjungan outlet, canvassing, dan follow-up prospek.</p>
    </div>
    <button id="btn-add-task" class="inline-flex items-center gap-2 bg-maroon-700 hover:bg-maroon-800 text-white px-4 py-2.5 rounded-lg text-sm font-semibold transition shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
      </svg>
      Tambah Agenda Kunjungan
    </button>
  </div>

  <!-- TASK LIST -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- COL 1: PENDING VISITS -->
    <div class="bg-slate-50 rounded-2xl border border-slate-100 p-4 space-y-4">
      <div class="flex items-center justify-between border-b border-slate-200/50 pb-2">
        <h3 class="font-bold text-slate-800 text-sm flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-amber-500"></span>
          Agenda Terjadwal (Pending)
        </h3>
        <span id="count-pending" class="bg-amber-100 text-amber-700 font-mono font-bold text-[10px] px-2 py-0.5 rounded-full">0</span>
      </div>
      <div id="list-pending" class="space-y-3 min-h-[300px]">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- COL 2 & 3: COMPLETED VISITS -->
    <div class="md:col-span-2 bg-white rounded-2xl border border-slate-100 shadow-sm p-5 space-y-4">
      <div class="flex items-center justify-between border-b border-slate-100 pb-2">
        <h3 class="font-bold text-slate-800 text-sm flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
          Riwayat Kunjungan Selesai (Completed)
        </h3>
        <span id="count-completed" class="bg-emerald-100 text-emerald-700 font-mono font-bold text-[10px] px-2 py-0.5 rounded-full">0</span>
      </div>
      <div id="list-completed" class="space-y-3">
        <!-- populated by JS -->
      </div>
    </div>
  </div>
</div>
