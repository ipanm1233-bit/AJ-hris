<div class="space-y-6">
  <!-- HEADER SECTION -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
    <div>
      <div class="flex items-center gap-2">
        <span class="p-2 bg-maroon-50 text-maroon-700 rounded-xl">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        </span>
        <h1 class="text-2xl font-bold text-slate-800">Draft & Builder Dokumen HRD</h1>
      </div>
      <p class="text-sm text-slate-500 mt-1">Pembuatan draft Kontrak Kerja, Surat Peringatan (SP), dan Pemanggilan resmi dengan kustomisasi klausul-klausul interaktif.</p>
    </div>
    <div class="flex items-center gap-2.5 shrink-0 flex-wrap">
      <button id="btn-gdoc-templates" class="border-2 border-blue-200 bg-blue-50/70 hover:bg-blue-100/80 text-blue-800 font-bold px-4 py-2.5 rounded-2xl text-xs sm:text-sm transition flex items-center gap-2 shadow-sm">
        <span>📄</span> Template Google Doc & Placeholders
      </button>
      <button id="btn-create-doc-draft" class="bg-maroon-700 hover:bg-maroon-800 text-white font-bold px-4 py-2.5 rounded-2xl text-xs sm:text-sm transition shadow-md hover:shadow-lg flex items-center gap-2">
        <span>➕</span> Buat Draft Dokumen Baru
      </button>
    </div>
  </div>

  <!-- FILTERS & SEARCH TOOLBAR -->
  <div class="flex flex-col sm:flex-row items-center justify-between gap-3 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
    <div class="flex items-center gap-2 overflow-x-auto w-full sm:w-auto pb-1 sm:pb-0">
      <button data-doc-filter="ALL" class="doc-filter-btn px-3.5 py-1.5 rounded-xl text-xs font-bold bg-maroon-700 text-white transition">Semua Draft</button>
      <button data-doc-filter="KONTRAK" class="doc-filter-btn px-3.5 py-1.5 rounded-xl text-xs font-bold text-slate-500 hover:bg-slate-100 transition">Kontrak Kerja</button>
      <button data-doc-filter="SP" class="doc-filter-btn px-3.5 py-1.5 rounded-xl text-xs font-bold text-slate-500 hover:bg-slate-100 transition">Surat Peringatan (SP)</button>
      <button data-doc-filter="PEMANGGILAN" class="doc-filter-btn px-3.5 py-1.5 rounded-xl text-xs font-bold text-slate-500 hover:bg-slate-100 transition">Pemanggilan / Konseling</button>
    </div>
    <div class="w-full sm:w-64">
      <input type="text" id="doc-search-input" placeholder="Cari nama / NIK / judul..." class="w-full px-3.5 py-2 text-xs rounded-xl border border-slate-200 outline-none focus:border-maroon-500">
    </div>
  </div>

  <!-- DRAFTS LIST TABLE / CARDS -->
  <div class="bg-white rounded-3xl border border-slate-100 p-5 shadow-sm">
    <div id="doc-drafts-list" class="space-y-3">
      <div class="p-8 text-center text-xs text-slate-400">Memuat berkas draft dokumen...</div>
    </div>
  </div>
</div>
